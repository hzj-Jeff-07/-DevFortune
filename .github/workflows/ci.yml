name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # core / CLI / VS Code 扩展在支持的 Node 版本矩阵上构建 + 测试
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-test-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: turbo-test-node${{ matrix.node-version }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build test typecheck --filter='!@devfortune/web'

  # Web 应用只在部署所用的 Node 版本上构建一次
  build-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-web-${{ github.sha }}
          restore-keys: turbo-web-

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build typecheck --filter=@devfortune/web

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
